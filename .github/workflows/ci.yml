# RepoSync CI - effort E-01 (Foundation) owns this workflow.
#
# What this gates:
#   - cargo check / clippy (-D warnings) / cargo test            (E-01 AC: Rust gates)
#   - pnpm typecheck / pnpm lint                                 (E-01 AC: frontend gates)
#   - reposync-core has NO tauri dependency, even transitively   (E-01 AC2: dependency hygiene)
#   - both Windows and macOS runners build AND bundle            (E-01 AC4: matrix green)
#   - git meets the >= 2.30 floor (exact pin deferred to E-04)   (E-01 AC8 / E-04 fixture harness)
#
# macOS posture: macOS is "compiles + bundles in CI" only and is NOT a test-execution
# target for the fixture suite (the suite runs on Windows). macOS still builds and bundles
# here because E-01 AC4 requires both runners green. macOS bundling is UNSIGNED on purpose -
# code signing and notarization are human-only (see EXECUTION.md) and arrive as a later job.

name: CI

on:
  push:
  pull_request:

# A newer push to the same ref cancels the older in-flight run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Documented EXACT git target for the future E-04 fixture harness (Windows-only), which
  # will cross-check git2 reads against git CLI porcelain output and needs BYTE-STABLE
  # output. E-04 does not exist yet, and pinning an exact git on the hosted runners proved
  # unreliable (choco's installer conflicts; MinGit PATH ordering is finicky). So CI today
  # VERIFIES the >= 2.30 floor (the E-03 engine requirement) instead of enforcing this exact
  # value. The robust exact-pin mechanism is tracked in docs/backlog.md (BL-NI-03).
  GIT_VERSION: "2.47.1"
  # Faster, quieter cargo in CI.
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      # Do not cancel the macOS leg if Windows fails (or vice versa); we want both signals.
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- Verify git meets the E-03 floor (>= 2.30) -------------------------------------
      # Both hosted runners ship a recent git well above the floor, so we VERIFY the floor
      # rather than install an exact version. Pinning an exact git on the runner proved
      # unreliable (choco's installer conflicts with the preinstalled git; MinGit's PATH
      # ordering did not shadow it). The byte-stable EXACT pin is only needed by the E-04
      # git fixture harness (Windows-only), which does not exist yet; GIT_VERSION above
      # records the intended target and docs/backlog.md (BL-NI-03) tracks the mechanism.
      - name: Verify git meets the >= 2.30 floor
        shell: bash
        run: |
          installed="$(git --version)"
          echo "Found: $installed (intended E-04 exact target: $GIT_VERSION)"
          num="$(echo "$installed" | grep -oE '[0-9]+\.[0-9]+' | head -1)"
          major="${num%.*}"; minor="${num#*.}"
          if [ "$major" -lt 2 ] || { [ "$major" -eq 2 ] && [ "$minor" -lt 30 ]; }; then
            echo "::error::git $num is below the required floor 2.30 (E-03 engine)."
            exit 1
          fi
          echo "git $num satisfies the >= 2.30 floor."

      # --- Toolchains ---------------------------------------------------------------------
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      # pnpm version comes from the "packageManager" field in package.json (single source of
      # truth). Do NOT also set a "version" input here - action-setup errors if both exist.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # The lockfile MUST be committed. --frozen-lockfile fails the build if pnpm-lock.yaml
      # is missing or out of date, which keeps CI dependency resolution reproducible.
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # --- Gates --------------------------------------------------------------------------
      - name: cargo check
        run: cargo check --workspace --all-targets

      - name: cargo clippy (deny warnings)
        run: cargo clippy --all -- -D warnings

      - name: cargo test
        run: cargo test --workspace

      # --- Stale-bindings gate (E-06 IPC contract) ----------------------------------------
      # The committed src/lib/bindings.ts is generated from the live tauri-specta surface by
      # the export_bindings test. Regenerate it here and fail if the working tree drifts: a
      # contract change (new command/event/type) that was not re-exported and committed would
      # otherwise ship a frontend type surface that lies about the backend. Windows-only
      # because the export_bindings test (a Tauri-linked [[test]] target) needs the
      # comctl32-v6 activation manifest that build.rs attaches only on Windows.
      - name: Assert bindings.ts is up to date
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          cargo test -p reposync --test export_bindings
          if ! git diff --exit-code -- src/lib/bindings.ts; then
            echo "::error::src/lib/bindings.ts is stale. Run the export_bindings test and commit the result."
            exit 1
          fi

      - name: pnpm typecheck
        run: pnpm typecheck

      - name: pnpm lint
        run: pnpm lint

      # --- Dependency-hygiene gate (E-01 AC2) ---------------------------------------------
      # reposync-core must never pull tauri, even transitively. This is the most load-bearing
      # assertion in the foundation: it fails the build the instant anything drags tauri into
      # the core crate. We grep the resolved dependency tree and exit 1 on any match.
      - name: Assert reposync-core has no tauri dependency
        shell: bash
        run: |
          echo "Resolving dependency tree for reposync-core..."
          tree="$(cargo tree -p reposync-core)"
          echo "$tree"
          if echo "$tree" | grep -i 'tauri'; then
            echo "::error::reposync-core depends on tauri (directly or transitively). The core crate must stay Tauri-free."
            exit 1
          fi
          echo "OK: reposync-core has no tauri dependency."

      # --- Build + bundle (E-01 AC4) ------------------------------------------------------
      # Build + bundle on each runner with the PREBUILT @tauri-apps/cli (a pinned
      # devDependency), via `pnpm tauri build`. This avoids `cargo install tauri-cli`,
      # which compiles the CLI from source and added several minutes per run. The per-push
      # release profile uses thin LTO (Cargo.toml [profile.release]) so the bundle stays
      # fast; full-LTO distribution artifacts use [profile.dist]. macOS bundling is UNSIGNED
      # (signing is human-only per EXECUTION.md). Artifacts are for inspection only; we do
      # NOT upload to GitHub Releases.
      - name: Build and bundle
        run: pnpm tauri build
        shell: bash
